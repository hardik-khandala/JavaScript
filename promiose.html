<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function delayedPromise(value) {
            return new Promise((resolve, reject) => {
              setTimeout(() => {
                resolve(`Resolved with value: ${value}`);
              }, 500);
            });
          }
          
          delayedPromise("Hello").then((result) => {
            console.log(result); 
          });
    </script>
</body>
</html>
