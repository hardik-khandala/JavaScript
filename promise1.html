<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function wrongInput(input) {
            return new Promise((resolve, reject) => {
              if (typeof input === 'string') {
                const reversedString = input.split('').reverse().join('');
                resolve(reversedString);
              } else {
                reject(`Rejected with value: ${input}`);
              }
            });
          }

          wrongInput("hello").then((result) => {
            console.log(result); 
          }).catch((error) => {
            console.log(error);
          });
          
          wrongInput(123).then((result) => {
            console.log(result);
          }).catch((error) => {
            console.log(error);
          });
          
    </script>
</body>
</html>
